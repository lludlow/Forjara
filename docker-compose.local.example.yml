# Local QA stack — no tailnet needed.
# Copy to docker-compose.local.yml (gitignored) and point the volume
# mounts at whatever you want to test: this checkout, or a hub of projects
# (one bind mount per project under /workspace).
services:
  forjara:
    build: .
    image: forjara:local
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Detroit}
      FORJARA_SERVICES: ${FORJARA_SERVICES:-vscode,web}
    ports:
      - "${FORJARA_WEB_PORT:-8080}:8080"
      - "${FORJARA_VSCODE_PORT:-8443}:8443"
    volumes:
      - forjara-local-config:/config
      - .:/workspace

volumes:
  forjara-local-config:
