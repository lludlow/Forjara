# One workspace container per project, each its own tailnet machine via
# tsdproxy. New project = copy a workspace block, change 3 lines, `up -d`.

x-workspace: &workspace
  image: ghcr.io/lludlow/forjara:latest
  # build: .    # uncomment to build locally instead of pulling
  restart: unless-stopped
  environment:
    TZ: America/Detroit
    FORJARA_SERVICES: ${FORJARA_SERVICES:-vscode,web}

services:
  tsdproxy:
    image: almeidapaulopt/tsdproxy:2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - tsdproxy-data:/data
      - ./config:/config        # config/tsdproxy.yaml holds the auth key
    restart: unless-stopped

  submind:
    <<: *workspace
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "submind"          # -> https://submind.<tailnet>.ts.net
      tsdproxy.port.1: "443/https:8443/http"
      tsdproxy.port.2: "8444/https:8080/http"
    volumes:
      - submind-config:/config
      - ${PROJECTS_DIR:-./projects}/submind:/workspace

  atlas:
    <<: *workspace
    # Needs OS packages beyond the base image? Give the project a derived
    # image (see "Project environments" in the README). The tag override and
    # pull_policy matter: without them Compose pulls the shared base instead
    # of building, and a build would clobber the shared base tag.
    # image: forjara-atlas
    # pull_policy: build
    # build:
    #   context: ${PROJECTS_DIR:-./projects}/atlas
    #   dockerfile: .forjara/Dockerfile
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "atlas"            # -> https://atlas.<tailnet>.ts.net
      tsdproxy.port.1: "443/https:8443/http"
      tsdproxy.port.2: "8444/https:8080/http"
    volumes:
      - atlas-config:/config
      - ${PROJECTS_DIR:-./projects}/atlas:/workspace

  # Needs Postgres/Redis/etc? Add a sidecar service — same Compose network,
  # so the workspace reaches it by name ("atlas-db:5432"). Never mount the
  # Docker socket into a workspace.
  # atlas-db:
  #   image: postgres:17
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_PASSWORD: dev
  #   volumes:
  #     - atlas-db-data:/var/lib/postgresql/data

volumes:
  tsdproxy-data:
  submind-config:
  atlas-config:
